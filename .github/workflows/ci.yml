name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - 'doc/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - 'doc/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2 # built with go1.26.1, required for go 1.26+ modules

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TEST_COUNT: ${{ github.ref_type == 'tag' && '5' || github.ref == 'refs/heads/main' && '3' || github.event_name == 'pull_request' && '3' || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v -race -count=${{ env.TEST_COUNT }} -timeout 120s ./...

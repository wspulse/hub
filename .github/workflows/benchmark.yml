name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/instructions/**'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Run benchmarks
        run: make bench-ci

      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: bench.txt
          retention-days: 30
